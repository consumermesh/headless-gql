langcode: en
status: true
dependencies:
  config:
    - image.style.embed_sm
    - image.style.embed_md
    - image.style.embed_lg
  module:
    - responsive_image
id: embedded_media
label: 'Embedded media'
image_style_mappings:
  - image_mapping_type: sizes
    image_mapping:
      sizes: '(min-width: 768px) 50vw, 100vw'
      sizes_image_styles:
        - embed_sm
        - embed_md
        - embed_lg
    breakpoint_id: responsive_image.viewport_sizing
    multiplier: '1x'
breakpoint_group: responsive_image
fallback_image_style: embed_md
